name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/jabin_ci?schema=public
  DIRECT_URL: postgresql://ci:ci@localhost:5432/jabin_ci?schema=public
  AUTH_SECRET: ci-auth-secret-minimum-32-characters-long
  AUTH_URL: http://localhost:3000
  ENCRYPTION_KEY: ci-encryption-key-minimum-32-chars
  GOOGLE_CLIENT_ID: ci-google-client-id
  GOOGLE_CLIENT_SECRET: ci-google-client-secret
  NODE_ENV: test
  EMAIL_PROVIDER: smtp
  SMTP_HOST: smtp.example.com
  SMTP_PORT: "587"
  SMTP_USER: ci@example.com
  SMTP_PASSWORD: ci-smtp-password
  SMTP_FROM: ci@example.com

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: E2E smoke (skipped without PLAYWRIGHT_BASE_URL)
        run: npm run test:e2e
        env:
          CI: true
